<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Day 05 — 상호작용 & 형 변환 실습</title>
</head>
<body>
  <h1>Day 05 — 상호작용 & 형 변환</h1>
  <p>👉 브라우저로 이 파일을 연 뒤 <b>F12 → Console</b> 탭에서 결과를 확인하세요.</p>
  <p>📖 오늘의 노트: <code>README.md</code></p>

  <script>
    "use strict";
    // ============================================
    //  ✍️ 여기에 오늘 배운 내용을 직접 타이핑하며 실습하세요
    // ============================================

    console.log("Day 05 — 상호작용 & 형 변환 실습 시작!");

    // prompt는 확인 시 문자열, 취소 시 null을 반환합니다.
    let userName = prompt("이름을 입력해 주세요.", "");

    if (userName === null) {
      alert("이름 입력을 취소했습니다.");
    } else {
      alert(`당신의 이름은 ${userName} 입니다.`);
    }

    // confirm은 확인 시 true, 취소 시 false를 반환합니다.
    let isStudent = confirm("학생인가요?");
    console.log("학생 여부:", isStudent);

    // 문자형 변환
    console.log(String(true));      // "true"
    console.log(typeof String(10)); // "string"

    // 숫자형 변환
    console.log(Number("123"));     // 123
    console.log(Number("  123  ")); // 123
    console.log(Number("123z"));    // NaN
    console.log(Number(null));      // 0
    console.log(Number(undefined)); // NaN

    // 불린형 변환
    console.log(Boolean(0));         // false
    console.log(Boolean(""));        // false
    console.log(Boolean(null));      // false
    console.log(Boolean(undefined)); // false
    console.log(Boolean(NaN));       // false
    console.log(Boolean("0"));       // true
    console.log(Boolean(" "));       // true
  </script>
</body>
</html>
